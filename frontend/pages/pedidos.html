<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Pedidos - Admin Vitoriana</title>

    <!-- CSS -->

    <link rel="stylesheet" href="../css/pedidos.css">

    <!-- BOOTSTRAP -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- ICONS -->

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

</head>

<body>

    <div class="container-admin">

        <!-- SIDEBAR -->

        <aside class="sidebar">

            <!-- LOGO -->

            <div class="logo">

                <img src="../midia/imagens/logo.png" alt="Logo">

                <h2>Pizzaria Vitoriana</h2>

            </div>

            <!-- MENU -->

            <nav class="menu">

                <a href="admin.html">

                    <i class="bi bi-grid-fill"></i>

                    <span>Dashboard</span>

                </a>

                <a href="pedidos.html" class="active">

                    <i class="bi bi-bag-fill"></i>

                    <span>Pedidos</span>

                </a>

                <a href="#">

                    <i class="bi bi-cash-stack"></i>

                    <span>Pagamentos</span>

                </a>

                <a href="#">

                    <i class="bi bi-graph-up"></i>

                    <span>Relatórios</span>

                </a>

                <a href="#">

                    <i class="bi bi-gear-fill"></i>

                    <span>Configurações</span>

                </a>

            </nav>

        </aside>

        <!-- CONTEÚDO -->

        <main class="pedidos">

            <!-- TOPO -->

            <div class="top-pedidos">

                <h1>
                    Lista de Pedidos
                </h1>

                <!-- BUSCA -->

                <div class="busca">

                    <i class="bi bi-search"></i>

                    <input
                        type="text"
                        id="buscarPedido"
                        placeholder="Buscar pedido..."
                    >

                </div>

            </div>

            <!-- TABELA -->

            <div class="tabela-pedidos">

                <table>

                    <thead>

                        <tr>

                            <th>ID</th>

                            <th>Cliente</th>

                            <th>Status</th>

                            <th>Total</th>

                            <th>Ações</th>

                        </tr>

                    </thead>

                    <tbody id="listaPedidos">

                        <!-- PEDIDOS VIA API -->

                    </tbody>

                </table>

                <!-- MENSAGEM -->

                <div
                    id="semPedidos"
                    class="sem-pedidos"
                >

                    Não há pedidos ainda.

                </div>

            </div>

        </main>

    </div>

    <script src="../js/pedidos.js"></script>

</body>

</html>
